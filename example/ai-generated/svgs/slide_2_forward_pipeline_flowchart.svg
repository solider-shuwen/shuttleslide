<svg id="forward_pipeline_flowchart" data-slot="forward_pipeline_flowchart" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 768">
  <desc>Pipeline flowchart showing: PPTX container (ZIP) → XML Parsing (slide.xml, theme.xml, slideLayout.xml) → Style Resolution (master→layout→slide CSS mapping) → Semantic HTML5 Emission with data-* metadata annotations. Boxes connected by directional arrows, styled in primary_color and accent_color on dark background.</desc>
  <defs>
    <!-- Arrowhead marker -->
    <marker id="arrowhead" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L12,5 L0,10 Z" fill="#00E5FF"/>
    </marker>
    <marker id="arrowhead-primary" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L12,5 L0,10 Z" fill="#2979FF"/>
    </marker>
    <!-- Glow filter for boxes -->
    <filter id="glow-primary" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#2979FF" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-accent" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#00E5FF" flood-opacity="0.35"/>
    </filter>
    <filter id="glow-warn" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#FF6D00" flood-opacity="0.3"/>
    </filter>
    <!-- Subtle gradient for dark panel -->
    <linearGradient id="panel-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141A2B"/>
      <stop offset="100%" stop-color="#0B0F1A"/>
    </linearGradient>
  </defs>

  <!-- Panel background (not full-bleed) -->
  <rect x="20" y="20" width="984" height="728" rx="20" fill="url(#panel-grad)" stroke="#1E2A4A" stroke-width="2"/>

  <!-- Title -->
  <text x="512" y="85" font-family="sans-serif" font-size="40" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">PPTX → HTML5 Pipeline</text>

  <!-- Decorative horizontal line under title -->
  <line x1="312" y1="105" x2="712" y2="105" stroke="#2979FF" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- ======== NODE 1: PPTX Container ======== -->
  <rect x="35" y="200" width="210" height="160" rx="12" fill="#0B0F1A" stroke="#2979FF" stroke-width="2.5" filter="url(#glow-primary)"/>
  <rect x="35" y="200" width="210" height="6" rx="3" fill="#2979FF"/>
  <text x="140" y="262" font-family="sans-serif" font-size="30" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PPTX</text>
  <text x="140" y="302" font-family="sans-serif" font-size="20" fill="#8899BB" text-anchor="middle">Container (ZIP)</text>

  <!-- Arrow 1→2 -->
  <line x1="245" y1="280" x2="283" y2="280" stroke="#00E5FF" stroke-width="3" marker-end="url(#arrowhead)" stroke-dasharray="6,4"/>

  <!-- ======== NODE 2: XML Parsing ======== -->
  <rect x="283" y="200" width="210" height="160" rx="12" fill="#0B0F1A" stroke="#00E5FF" stroke-width="2.5" filter="url(#glow-accent)"/>
  <rect x="283" y="200" width="210" height="6" rx="3" fill="#00E5FF"/>
  <text x="388" y="250" font-family="sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">XML Parsing</text>
  <text x="388" y="288" font-family="sans-serif" font-size="18" fill="#8899BB" text-anchor="middle">slide.xml</text>
  <text x="388" y="315" font-family="sans-serif" font-size="18" fill="#8899BB" text-anchor="middle">theme.xml</text>
  <text x="388" y="342" font-family="sans-serif" font-size="18" fill="#8899BB" text-anchor="middle">slideLayout.xml</text>

  <!-- Arrow 2→3 -->
  <line x1="493" y1="280" x2="531" y2="280" stroke="#00E5FF" stroke-width="3" marker-end="url(#arrowhead)" stroke-dasharray="6,4"/>

  <!-- ======== NODE 3: Style Resolution ======== -->
  <rect x="531" y="200" width="210" height="160" rx="12" fill="#0B0F1A" stroke="#FF6D00" stroke-width="2.5" filter="url(#glow-warn)"/>
  <rect x="531" y="200" width="210" height="6" rx="3" fill="#FF6D00"/>
  <text x="636" y="248" font-family="sans-serif" font-size="26" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Style</text>
  <text x="636" y="280" font-family="sans-serif" font-size="26" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Resolution</text>
  <text x="636" y="318" font-family="sans-serif" font-size="18" fill="#8899BB" text-anchor="middle">master → layout</text>
  <text x="636" y="345" font-family="sans-serif" font-size="18" fill="#8899BB" text-anchor="middle">→ slide CSS</text>

  <!-- Arrow 3→4 -->
  <line x1="741" y1="280" x2="779" y2="280" stroke="#00E5FF" stroke-width="3" marker-end="url(#arrowhead-primary)" stroke-dasharray="6,4"/>

  <!-- ======== NODE 4: Semantic HTML5 ======== -->
  <rect x="779" y="200" width="210" height="160" rx="12" fill="#0B0F1A" stroke="#2979FF" stroke-width="2.5" filter="url(#glow-primary)"/>
  <rect x="779" y="200" width="210" height="6" rx="3" fill="#2979FF"/>
  <text x="884" y="248" font-family="sans-serif" font-size="26" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Semantic</text>
  <text x="884" y="280" font-family="sans-serif" font-size="26" font-weight="bold" fill="#FFFFFF" text-anchor="middle">HTML5</text>
  <text x="884" y="318" font-family="sans-serif" font-size="20" fill="#8899BB" text-anchor="middle">Emission</text>
  <text x="884" y="345" font-family="sans-serif" font-size="16" fill="#00E5FF" text-anchor="middle" opacity="0.9">data-* metadata</text>

  <!-- ======== Pipeline flow label ======== -->
  <!-- Decorative dashed path tracing the pipeline -->
  <path d="M140,365 L140,395 Q140,415 160,415 L864,415 Q884,415 884,395 L884,365" fill="none" stroke="#1E2A4A" stroke-width="1.5" stroke-dasharray="4,6" opacity="0.5"/>

  <!-- Step indicators below each node -->
  <circle cx="140" cy="410" r="14" fill="#2979FF" opacity="0.25"/>
  <circle cx="140" cy="410" r="8" fill="#2979FF"/>
  <text x="140" y="416" font-family="sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>

  <circle cx="388" cy="410" r="14" fill="#00E5FF" opacity="0.25"/>
  <circle cx="388" cy="410" r="8" fill="#00E5FF"/>
  <text x="388" y="416" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0B0F1A" text-anchor="middle">2</text>

  <circle cx="636" cy="410" r="14" fill="#FF6D00" opacity="0.25"/>
  <circle cx="636" cy="410" r="8" fill="#FF6D00"/>
  <text x="636" y="416" font-family="sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>

  <circle cx="884" cy="410" r="14" fill="#2979FF" opacity="0.25"/>
  <circle cx="884" cy="410" r="8" fill="#2979FF"/>
  <text x="884" y="416" font-family="sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">4</text>

  <!-- ======== Bottom description area ======== -->
  <rect x="62" y="510" width="900" height="170" rx="12" fill="#0D1225" stroke="#1E2A4A" stroke-width="1.5" opacity="0.9"/>
  <text x="512" y="560" font-family="sans-serif" font-size="20" fill="#8899BB" text-anchor="middle">Pipeline stages convert a PPTX archive into a semantic HTML5 document</text>
  <text x="512" y="595" font-family="sans-serif" font-size="20" fill="#8899BB" text-anchor="middle">with style inheritance resolved through the master → layout → slide chain</text>
  <text x="512" y="630" font-family="sans-serif" font-size="20" fill="#8899BB" text-anchor="middle">and all metadata preserved as data-* attributes on HTML elements.</text>

  <!-- Decorative corner accents -->
  <path d="M30,30 L70,30" fill="none" stroke="#2979FF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <path d="M30,30 L30,70" fill="none" stroke="#2979FF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <path d="M994,30 L954,30" fill="none" stroke="#00E5FF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <path d="M994,30 L994,70" fill="none" stroke="#00E5FF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <path d="M30,738 L70,738" fill="none" stroke="#00E5FF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <path d="M30,738 L30,698" fill="none" stroke="#00E5FF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <path d="M994,738 L954,738" fill="none" stroke="#2979FF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <path d="M994,738 L994,698" fill="none" stroke="#2979FF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
</svg>
